<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Утренняя зарядка</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; background: #0d0d0d; color: #fff; font-family: system-ui, -apple-system, sans-serif; height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; }
    #screen { text-align: center; width: 100%; padding: 20px; }
    #phase { font-size: 3vw; opacity: 0.6; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 2px; }
    #name { font-size: 6vw; margin: 10px 0 20px; font-weight: 700; }
    #media { width: 80vw; max-width: 900px; height: 50vh; object-fit: contain; background: #1a1a1a; border-radius: 16px; }
    #timer { font-size: 10vw; font-weight: 800; margin-top: 20px; font-variant-numeric: tabular-nums; }
    #btn { padding: 25px 50px; font-size: 4vw; background: #2563eb; color: #fff; border: none; border-radius: 12px; cursor: pointer; transition: 0.2s; }
    #btn:hover { background: #1d4ed8; transform: scale(1.05); }
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div id="screen">
    <div id="start">
      <h1 style="font-size: 7vw; margin-bottom: 40px;">Утренняя зарядка (20 мин)</h1>
      <button id="btn" onclick="run()">▶ Начать</button>
    </div>
    <div id="workout" class="hidden">
      <div id="phase">Приготовиться</div>
      <h1 id="name">Упражнение</h1>
      <img id="media" src="" alt="Демо">
      <div id="timer">00:00</div>
    </div>
  </div>

  <script>
    // ⚡ Данные из твоего PDF (время адаптировано под таймер)
    const EXERCISES = [
      { name: "Супермен", work: 25, rest: 10, img: "images/superman.jpg" },
      { name: "Ягодичный мост", work: 30, rest: 10, img: "images/bridge.jpg" },
      { name: "Планка", work: 60, rest: 15, img: "images/plank.jpg" },
      { name: "Кошка-корова", work: 50, rest: 10, img: "images/cowcat.jpg" },
      { name: "Птица-собака", work: 40, rest: 10, img: "images/birddog.jpg" },
      { name: "Сведение лопаток у стены", work: 30, rest: 10, img: "images/wall.jpg" },
      { name: "Заминка: Колени к груди", work: 120, rest: 0, img: "images/stretch.jpg" }
    ];

    let idx = 0, interval;

    function run() {
      document.getElementById('start').classList.add('hidden');
      document.getElementById('workout').classList.remove('hidden');
      next();
    }

    function next() {
      if (idx >= EXERCISES.length) return finish();
      const ex = EXERCISES[idx];
      document.getElementById('phase').textContent = 'Работа';
      document.getElementById('name').textContent = ex.name;
      document.getElementById('media').src = ex.img;
      document.getElementById('media').style.display = 'block';
      
      countdown(ex.work, () => {
        if (ex.rest > 0) {
          document.getElementById('phase').textContent = 'Отдых';
          document.getElementById('name').textContent = 'Дышим...';
          document.getElementById('media').style.display = 'none';
          countdown(ex.rest, () => { idx++; next(); });
        } else {
          finish();
        }
      });
    }

    function countdown(sec, cb) {
      clearInterval(interval);
      let t = sec;
      show(t);
      interval = setInterval(() => {
        t--;
        show(t);
        if (t <= 0) { clearInterval(interval); cb(); }
      }, 1000);
    }

    function show(s) {
      const m = Math.floor(s/60).toString().padStart(2,'0');
      const sec = (s%60).toString().padStart(2,'0');
      document.getElementById('timer').textContent = `${m}:${sec}`;
    }

    function finish() {
      clearInterval(interval);
      document.getElementById('phase').textContent = '';
      document.getElementById('name').textContent = 'Готово! 🎉';
      document.getElementById('timer').textContent = '';
      document.getElementById('media').style.display = 'none';
    }
  </script>
</body>
</html>
